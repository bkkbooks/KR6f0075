body:
  text: 無量壽經序胡吉藏撰夫法身虛玄非名相之形淨剎妙遠絶淨穢之域至妙之門非百是所是亦非百非所非真虛之道非有心之所託亦非無心之所會非能非所是穢亦淨以不二而二有本迹之稱存淨穢之教此是隨緣之意應物之門緣既有多種教亦恆沙莫算身復非一土有勝劣不同或現穢質令生厭心或示淨處使修勝善是以思惟夫人遇此惡緣厭纍苦之世欣勝樂之地由是佛現金臺示十方界淨妙之國令此今緣撰取所樂夫人情感安養極樂如來廣説淨土依正勝果正業妙因故此經以不二為體若存胡音云佛陀槃遮阿梨耶阿彌陀佛陀修多羅此云覺者説觀無量壽覺者經胡漢兩存故云佛説觀無量壽佛經
